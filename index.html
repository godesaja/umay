<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Photo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;
            -webkit-overflow-scrolling: none;
            overscroll-behavior: none;
        }

        body {
            background: url('./foto_bg.jpg') no-repeat center top;
            background-size: cover;
            background-position: center top;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tapArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container foto — layering */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Foto 2 — di belakang, z-index 1 */
        #photo2 {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            border: 4px solid #00FFFF;
            box-shadow: 
                0 0 10px #00FFFF,
                0 0 20px #00FFFF,
                0 0 40px #00FFFF,
                0 0 80px rgba(0, 255, 255, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.4);
            outline: 2px solid rgba(0, 255, 255, 0.5);
            outline-offset: 4px;
            border-radius: 12px;
            background: linear-gradient(145deg, #E0F7FA 0%, #B2EBF2 50%, #80DEEA 100%);
            filter: brightness(1.05) contrast(1.02);
            transition: all 0.3s ease;
        }

        #photo2:hover {
            box-shadow: 
                0 0 15px #00FFFF,
                0 0 30px #00FFFF,
                0 0 60px #00FFFF,
                0 0 100px rgba(0, 255, 255, 0.5),
                0 25px 70px rgba(0, 0, 0, 0.5);
            transform: scale(1.02);
        }

        /* Foto 1 — di depan, z-index 2 */
        #photo1Container {
            position: absolute;
            z-index: 2;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-fit: contain;
            aspect-ratio: 3 / 4;
        }

        #photo1 {
            width: 100%;
            height: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            border: none;
            outline: none;
            box-shadow: none;
            background: none;
            filter: none;
            border-radius: 0;
            display: block;
        }

        /* Speech Bubble — absolute terhadap scene, posisi diatur via JS berdasarkan foto2 */
        .speech-bubble {
            position: absolute;
            /* Posisi diatur via JS berdasarkan foto2 */
            top: 0;
            left: 0;
            transform: translateX(-50%);
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            white-space: nowrap;
            z-index: 10;
            transition: left 0.5s ease-in-out;
        }

        .speech-bubble.even {
            /* Genap = center horizontal dari foto2 */
            left: 50%;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid white;
        }

        .bubble-text {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        /* Animasi bounce pada bubble */
        @keyframes bubbleBounce {
            0% { transform: translateX(-50%) scale(1, 1); }
            30% { transform: translateX(-50%) scale(0.85, 0.55); }
            50% { transform: translateX(-50%) scale(1.15, 0.9); }
            70% { transform: translateX(-50%) scale(0.92, 0.82); }
            100% { transform: translateX(-50%) scale(1, 1); }
        }

        .speech-bubble.animating {
            animation: bubbleBounce 0.5s ease-in-out;
        }

        /* Hint */
        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 5;
        }

        .img-error {
            background: rgba(255,0,0,0.1) !important;
            min-width: 100px;
            min-height: 75px;
        }
    </style>
<base target="_blank">
</head>
<body>

<div id="tapArea">
    <div class="scene">
        <img src="./foto_2.png" alt="" id="photo2">

        <div class="speech-bubble" id="speechBubble">
            <div class="bubble-text" id="bubbleText">Halo!</div>
        </div>

        <div id="photo1Container">
            <img src="./foto_1a.png" alt="" id="photo1">
        </div>
    </div>
    <div class="hint">Ketuk layar</div>
</div>

<script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    window.addEventListener('wheel', function(e) { e.preventDefault(); }, { passive: false });

    let isPhoto1A = true;
    let textIndex = 0;
    const texts = ["BACK OFF!!", "she's mine :b", "GAME OVER!!", "she chose me >_<"];

    const photo1 = document.getElementById('photo1');
    const photo2 = document.getElementById('photo2');
    const speechBubble = document.getElementById('speechBubble');
    const bubbleText = document.getElementById('bubbleText');
    const tapArea = document.getElementById('tapArea');

    photo1.onerror = function() {
        this.classList.add('img-error');
        this.alt = 'foto_1a.png tidak ditemukan';
    };
    photo2.onerror = function() {
        this.classList.add('img-error');
        this.alt = 'foto_2.png tidak ditemukan';
    };

    function animatePhoto(el) {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'photoBounce 0.5s ease-in-out';
        setTimeout(() => { el.style.animation = ''; }, 500);
    }

    const photoStyle = document.createElement('style');
    photoStyle.textContent = `
        @keyframes photoBounce {
            0% { transform: scale(1, 1); }
            30% { transform: scale(0.85, 0.55); }
            50% { transform: scale(1.15, 0.9); }
            70% { transform: scale(0.92, 0.82); }
            100% { transform: scale(1, 1); }
        }
    `;
    document.head.appendChild(photoStyle);

    // Fungsi untuk mengupdate posisi speech bubble berdasarkan foto2
    function updateBubblePosition() {
        const photo2Rect = photo2.getBoundingClientRect();
        const sceneRect = document.querySelector('.scene').getBoundingClientRect();

        // Posisi top: 100px di atas foto2 (relatif ke scene)
        const topPos = photo2Rect.top - sceneRect.top - -30;

        // Posisi left: tergantung ganjil/genap
        let leftPos;
        if (textIndex % 2 === 0) {
            // Ganjil: kanan atas foto2 (70% dari lebar foto2)
            leftPos = photo2Rect.left - sceneRect.left + (photo2Rect.width * 0.7);
        } else {
            // Genap: center horizontal foto2
            leftPos = photo2Rect.left - sceneRect.left + (photo2Rect.width * 0.5);
        }

        speechBubble.style.top = topPos + 'px';
        speechBubble.style.left = leftPos + 'px';
    }

    // Update posisi saat window resize
    window.addEventListener('resize', updateBubblePosition);
    // Update posisi saat foto2 load
    photo2.addEventListener('load', updateBubblePosition);
    // Update posisi setelah DOM ready
    window.addEventListener('DOMContentLoaded', updateBubblePosition);
    // Update posisi setelah semua resource load
    window.addEventListener('load', updateBubblePosition);

    function handleTap(e) {
        e.preventDefault();

        isPhoto1A = !isPhoto1A;
        animatePhoto(photo1);
        setTimeout(() => {
            photo1.src = isPhoto1A ? './foto_1a.png' : './foto_1b.png';
        }, 150);

        textIndex = (textIndex + 1) % texts.length;

        // Update posisi bubble berdasarkan foto2
        updateBubblePosition();

        bubbleText.textContent = texts[textIndex];

        speechBubble.classList.remove('animating');
        void speechBubble.offsetWidth;
        speechBubble.classList.add('animating');
        setTimeout(() => {
            speechBubble.classList.remove('animating');
        }, 500);
    }

    tapArea.addEventListener('click', handleTap);
    tapArea.addEventListener('touchstart', function(e) { e.preventDefault(); handleTap(e); }, { passive: false });

    // Initial position update
    setTimeout(updateBubblePosition, 100);
</script>

</body>
</html>
