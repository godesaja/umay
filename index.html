<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Photo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;
            -webkit-overflow-scrolling: none;
            overscroll-behavior: none;
        }

        body {
            background: url('./foto_bg.jpg') no-repeat center top;
            background-size: cover;
            background-position: center top;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tapArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #photo2 {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            border: 4px solid #FF69B4;
            box-shadow: 
                0 0 10px #FF69B4,
                0 0 20px #FF69B4,
                0 0 40px #FF69B4,
                0 0 80px rgba(255, 105, 180, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.4);
            outline: 2px solid rgba(255, 105, 180, 0.5);
            outline-offset: 4px;
            border-radius: 12px;
            background: linear-gradient(145deg, #FFE0F0 0%, #FFB2D8 50%, #FF80C0 100%);
            filter: brightness(1.05) contrast(1.02);
            transition: all 0.3s ease;
        }

        #photo2:hover {
            box-shadow: 
                0 0 15px #FF69B4,
                0 0 30px #FF69B4,
                0 0 60px #FF69B4,
                0 0 100px rgba(255, 105, 180, 0.5),
                0 25px 70px rgba(0, 0, 0, 0.5);
            transform: scale(1.02);
        }

        #photo1Container {
            position: absolute;
            z-index: 2;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            aspect-ratio: 3 / 4;
        }

        #photo1 {
            width: 100%;
            height: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            border: none;
            outline: none;
            box-shadow: none;
            background: none;
            filter: none;
            border-radius: 0;
            display: block;
        }

        .speech-bubble {
            position: absolute;
            top: 0;
            left: 0;
            transform: translateX(-50%);
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            white-space: nowrap;
            z-index: 10;
            transition: left 0.5s ease-in-out;
        }

        .speech-bubble.even {
            left: 50%;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid white;
        }

        .bubble-text {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        @keyframes bubbleBounce {
            0% { transform: translateX(-50%) scale(1, 1); }
            30% { transform: translateX(-50%) scale(0.85, 0.55); }
            50% { transform: translateX(-50%) scale(1.15, 0.9); }
            70% { transform: translateX(-50%) scale(0.92, 0.82); }
            100% { transform: translateX(-50%) scale(1, 1); }
        }

        .speech-bubble.animating {
            animation: bubbleBounce 0.5s ease-in-out;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 5;
        }

        .img-error {
            background: rgba(255,0,0,0.1) !important;
            min-width: 100px;
            min-height: 75px;
        }
    </style>
</head>
<body>

<div id="tapArea">
    <div class="scene">
        <img src="./foto_2.png" alt="" id="photo2">

        <div class="speech-bubble" id="speechBubble">
            <div class="bubble-text" id="bubbleText">Halo!</div>
        </div>

        <div id="photo1Container">
            <img src="./foto_1a.png" alt="" id="photo1">
        </div>
    </div>
    <div class="hint">Ketuk layar</div>
</div>

<audio id="bgMusic" src="./music.mp3" loop preload="auto"></audio>
<audio id="tapSound" src="./sound.mp3" preload="auto"></audio>

<script>
    // Prevent scrolling and zooming immediately
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    window.addEventListener('wheel', function(e) { e.preventDefault(); }, { passive: false });

    let isPhoto1A = true;
    let textIndex = 0;
    const texts = ["BACK OFF!!", "he's mine :b", "GAME OVER!!", "he chose me >_<"];

    const photo1 = document.getElementById('photo1');
    const photo2 = document.getElementById('photo2');
    const speechBubble = document.getElementById('speechBubble');
    const bubbleText = document.getElementById('bubbleText');
    const tapArea = document.getElementById('tapArea');

    const bgMusic = document.getElementById('bgMusic');
    const tapSound = document.getElementById('tapSound');

    let audioStarted = false;

    // Function to start background music
    function startAudio() {
        if (audioStarted) return;
        audioStarted = true;

        // Set volume and attempt to play
        bgMusic.volume = 0.5;
        
        // Try to play and catch any errors
        const playPromise = bgMusic.play();
        
        if (playPromise !== undefined) {
            playPromise.catch(function(error) {
                console.log('Audio play failed:', error);
                // If autoplay is blocked, we need user interaction
                audioStarted = false;
            });
        }
    }

    // Function to play tap sound
    function playTapSound() {
        tapSound.currentTime = 0;
        tapSound.play().catch(function() {
            // Silently fail if audio not ready
        });
    }

    // Error handling for images
    photo1.onerror = function() {
        this.classList.add('img-error');
        this.alt = 'foto_1a.png tidak ditemukan';
    };
    photo2.onerror = function() {
        this.classList.add('img-error');
        this.alt = 'foto_2.png tidak ditemukan';
    };

    // Photo bounce animation
    function animatePhoto(el) {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'photoBounce 0.5s ease-in-out';
        setTimeout(() => { el.style.animation = ''; }, 500);
    }

    const photoStyle = document.createElement('style');
    photoStyle.textContent = `
        @keyframes photoBounce {
            0% { transform: scale(1, 1); }
            30% { transform: scale(0.85, 0.55); }
            50% { transform: scale(1.15, 0.9); }
            70% { transform: scale(0.92, 0.82); }
            100% { transform: scale(1, 1); }
        }
    `;
    document.head.appendChild(photoStyle);

    // Update speech bubble position
    function updateBubblePosition() {
        const photo2Rect = photo2.getBoundingClientRect();
        const sceneRect = document.querySelector('.scene').getBoundingClientRect();
        const topPos = photo2Rect.top - sceneRect.top - 30;
        let leftPos;
        if (textIndex % 2 === 0) {
            leftPos = photo2Rect.left - sceneRect.left + (photo2Rect.width * 0.7);
        } else {
            leftPos = photo2Rect.left - sceneRect.left + (photo2Rect.width * 0.5);
        }
        speechBubble.style.top = topPos + 'px';
        speechBubble.style.left = leftPos + 'px';
    }

    window.addEventListener('resize', updateBubblePosition);
    photo2.addEventListener('load', updateBubblePosition);
    window.addEventListener('DOMContentLoaded', updateBubblePosition);
    window.addEventListener('load', updateBubblePosition);

    // Main tap handler
    function handleTap(e) {
        e.preventDefault();
        e.stopPropagation();

        // Start audio on first tap
        startAudio();
        
        // Play tap sound
        playTapSound();

        // Switch photo
        isPhoto1A = !isPhoto1A;
        animatePhoto(photo1);
        setTimeout(() => {
            photo1.src = isPhoto1A ? './foto_1a.png' : './foto_1b.png';
        }, 150);
        
        // Update text
        textIndex = (textIndex + 1) % texts.length;
        updateBubblePosition();
        bubbleText.textContent = texts[textIndex];
        
        // Animate bubble
        speechBubble.classList.remove('animating');
        void speechBubble.offsetWidth;
        speechBubble.classList.add('animating');
        setTimeout(() => {
            speechBubble.classList.remove('animating');
        }, 500);
    }

    // Attach event listeners directly to document body for maximum compatibility
    document.body.addEventListener('click', handleTap);
    document.body.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleTap(e);
    }, { passive: false });

    // Also keep tapArea listeners as fallback
    tapArea.addEventListener('click', handleTap);
    tapArea.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleTap(e);
    }, { passive: false });

    // Initial bubble position
    setTimeout(updateBubblePosition, 100);
</script>

</body>
</html>
